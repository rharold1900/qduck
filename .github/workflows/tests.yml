name: qduck-tests

on:
  push:
  pull_request:

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ["3.10", "3.11", "3.12", "3.13"]

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Upgrade pip
        run: |
          python -m pip install --upgrade pip

      - name: Install qduck with dev dependencies
        run: |
          pip install ".[dev]"

      - name: Smoke test
        run: |
          python -c "import qduck; public_key, private_key = qduck.generate_keypair(); aes_key, key_block = qduck.derive_key(public_key); msg = b'hello qduck'; ct = qduck.encrypt_blob(msg, aes_key, aad=key_block); pt = qduck.decrypt_blob(ct, aes_key, aad=key_block); assert pt == msg; print('PASS')"

      - name: Run test suite
        run: |
          pytest tests/ -v
